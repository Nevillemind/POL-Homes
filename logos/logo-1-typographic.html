<!DOCTYPE html>
<html lang="en">
<head>

<style>
body { margin: 60px; background: #fefdfb; font-family: 'Georgia', serif; }
.logo { display: flex; align-items: center; gap: 24px; }
.icon { width: 64px; height: 64px; }
.name { font-size: 28px; color: #2f855a; letter-spacing: 1px; line-height: 1.2; }
.name small { display: block; font-size: 12px; color: #6b6b6b; letter-spacing: 3px; text-transform: uppercase; font-family: sans-serif; }
hr { margin: 40px 0; border: none; border-top: 1px solid #e8e4dc; }
.v-dark { background: #1a1a1a; padding: 40px; }
.v-dark .name { color: #4ade80; }
.v-dark .name small { color: #9b9b9b; }
.v-dark hr { border-color: #333; }
</style>
</head>
<body>

<div class="logo">

  <div class="name">Peace of Life<br><small>Recovery Residences</small></div>

  <div style="font-size:11px;color:#8b8b8b;letter-spacing:3px;text-transform:uppercase;font-family:sans-serif">Recovery Residences</div>
