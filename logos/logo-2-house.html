<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
body { margin: 60px; background: #fefdfb; font-family: 'Georgia', serif; }
.logo { display: flex; align-items: center; gap: 24px; }
.icon { width: 64px; height: 64px; }
.name { font-size: 28px; color: #2f855a; letter-spacing: 1px; line-height: 1.2; }
.name small { display: block; font-size: 12px; color: #6b6b6b; letter-spacing: 3px; text-transform: uppercase; font-family: sans-serif; }
hr { margin: 40px 0; border: none; border-top: 1px solid #e8e4dc; }
</style>
</head>
<body>

<h3 style="font-family:sans-serif;color:#8b8b8b;font-weight:400">Concept 2 — House + Typography</h3>
<div class="logo">
  <svg class="icon" viewBox="0 0 64 64">
    <path d="M8 28L32 6l24 22" fill="none" stroke="#2f855a" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M12 26v24h16V38h8v12h16V26" fill="none" stroke="#2f855a" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="24" y="40" width="6" height="8" fill="#2f855a" opacity="0.3"/>
    <rect x="34" y="40" width="6" height="8" fill="#2f855a" opacity="0.3"/>
  </svg>
  <div class="name">Peace of Life<br><small>Recovery Residences</small></div>
</div>

<hr>

<h3 style="font-family:sans-serif;color:#8b8b8b;font-weight:400">Variation — Centered</h3>
<div style="text-align:center">
  <svg width="56" height="56" viewBox="0 0 64 64">
    <path d="M8 28L32 6l24 22" fill="none" stroke="#2f855a" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M12 26v24h16V38h8v12h16V26" fill="none" stroke="#2f855a" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="24" y="40" width="6" height="8" fill="#2f855a" opacity="0.3"/>
    <rect x="34" y="40" width="6" height="8" fill="#2f855a" opacity="0.3"/>
  </svg>
  <div style="margin-top:12px;font-size:22px;color:#2f855a;letter-spacing:1px">Peace of Life Homes</div>
  <div style="font-size:11px;color:#8b8b8b;letter-spacing:3px;text-transform:uppercase;font-family:sans-serif">Recovery Residences</div>
</div>

</body>
</html>
